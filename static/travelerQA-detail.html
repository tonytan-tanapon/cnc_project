<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA Inspection · Topnotch</title>

  <!-- Global styles -->
  <link rel="stylesheet" href="/static/css/app.css" />

  <!-- Tabulator -->
  <link rel="stylesheet" href="/static/vendor/tabulator/tabulator_modern.min.css" />
  <script src="/static/vendor/tabulator/tabulator.min.js"></script>

  <style>
    .main--edge {
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    .panel--edge {
      margin: 0;
      border-radius: 0;
      border-left-width: 0;
      border-right-width: 0;
    }

    #qaPanel {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .header {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .col-3 {
      grid-column: span 3;
    }

    .col-12 {
      grid-column: span 12;
    }

    .header .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header input {
      height: 36px;
      padding: 0 12px;
    }

    .list-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 44px;
      border-bottom: 1px solid #e5e7eb;
    }

    #qa_wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    #qa_wrap .tabulator {
      height: 100% !important;
      border: 0;
    }

    .btn-mini {
      font: inherit;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      cursor: pointer;
    }

    .btn-mini:hover {
      background: #f1f5f9;
    }

    .err {
      color: #b91c1c;
      font-size: 14px;
      margin-top: 6px;
    }

    .quick-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: #f3f4f6;
      font-weight: 600;
    }

    .quick-links a:hover {
      background: #e5e7eb;
    }

    /* Badge */
    #latestBadge {
      display: none;
      background: #16a34a;
      color: white;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .lot-info-box {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 8px 12px;
      margin-bottom: 8px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
      border-color: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div id="navSlot" data-nav-slot></div>
    </aside>

    <!-- Main -->
    <main class="main main--edge">

      <!-- Quick Links -->
      <section class="quick-links">
        <div id="lot_link">🧾 LOT</div>
        <!-- <div id="material_link">🔩 Material</div> -->
        <div id="traveler_link">🧾 Traveler</div>
        <div id="inspection_link">🧾 Inspection</div>
        <div id="shippment_link">📦 Shipment</div>
      </section>

      <!-- Panel -->
      <section class="panel panel--edge" id="qaPanel">

        <!-- Title -->
        <div style="
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 8px 0 6px 0;
        ">

          <h2 id="inspectionTitle">(loading…)</h2>


          <!-- 🔥 Badge -->
          <span id="latestBadge">LATEST</span>
        </div>

        <!-- Header -->
        <div class="lot-info-box">

          <div>
            <b>Lot:</b>
            <span id="info_lot_no"></span>
          </div>

          <div>
            <b>Part:</b>
            <span id="info_part_no"></span>
          </div>

          <div>
            <b>Rev:</b>
            <span id="info_rev"></span>
          </div>

          <div>
            <b>Customer:</b>
            <span id="info_customer"></span>
          </div>

        </div>
        <!-- <div class="header">
          <div class="field col-3">
            <label>Inspector (Emp)</label>
            <input id="inspector_id" placeholder="ค้นหา emp…" />
          </div>

          <div class="col-12">
            <div id="errorBox" class="err" style="display: none"></div>
          </div>
        </div> -->

        <!-- Toolbar -->
        <div class="list-topbar">
          <button id="btnAddRow" class="btn-mini">
            + Add Row
          </button>

          <button id="btnAddTemplate" class="btn-mini">
            Use template
          </button>

          <button id="btnImportInspection" class="btn-mini">
            📂 Import Inspection
          </button>

          <input type="file" id="inspectionFileInput" accept=".docx" style="display:none">
          <button id="btnDetail" class="btn-mini">
          Detail
        </button>

          <button id="btnUpdateInspection" class="btn-mini">
            💾 Update Inspection
          </button>

          <input type="text" id="fileInputDir" readonly style="width:300px">
        </div>
        

        <div class="list-topbar">
          <button id="btnExportInspection" class="btn-mini">
            Export Inspection
          </button>

          <button id="btnExportBlank" class="btn-mini">
            Export Blank
          </button>


          <button id="btnSaveAll" class="btn-mini">
            💾 Save All
          </button>
          <select id="inspectionInspector" class="input" style="width:180px">
            <option value="">Select Inspector</option>
          </select>
          <span style="margin-left:20px">
            Alt + 0216 (Ø), 0177 (±), 0176 (°)
          </span>
          <span style="margin-left:auto"></span>

          <button id="btnDeleteAll" class="btn-mini btn-danger">
            🗑 Delete All
          </button>


        </div>

        <!-- Table -->
        <div id="qa_wrap">
          <div id="qa_table"></div>
        </div>

      </section>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toastText"></span>
  </div>

  <!-- Scripts -->
  <script type="module" src="/static/js/nav-loader.js"></script>
  <script type="module" src="/static/js/page-travelerQA-detail.js?v=1.6"></script>

</body>

</html>
