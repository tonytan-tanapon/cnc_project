<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>QR Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 800;
        }

        p {
            margin-bottom: 24px;
            color: #64748b;
            font-size: 16px;
        }

        input {
            width: 100%;
            max-width: 420px;
            font-size: 26px;
            padding: 16px 18px;
            border-radius: 12px;
            border: 2px solid #cbd5f5;
            outline: none;
            text-align: center;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 700;
            color: #16a34a;
            word-break: break-all;
        }

        .hint {
            margin-top: 12px;
            font-size: 14px;
            color: #94a3b8;
        }


        .pin-dot {
            color: #cbd5f5;
            /* empty = light gray */
        }

        .pin-dot.filled {
            color: #2563eb;
            /* typing = blue */
        }

        #pinKeys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 30px;
            width: 100%;
        }

        .pin-btn {
            font-size: 32px;
            padding: 28px 0;
            border-radius: 18px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 800;
            min-height: 90px;
            transition: 0.15s;
        }

        .pin-btn:active {
            transform: scale(0.95);
            background: #cbd5f5;
        }

        .pin-btn:active {
            background: #cbd5f5;
        }

        /* Special buttons */
        .pin-btn:nth-last-child(3) {
            /* DEL */
            background: #fecaca;
        }

        .pin-btn:nth-last-child(1) {
            /* CLEAR */
            background: #fde68a;
        }

        .machine-btn {
            padding: 28px 14px;
            border-radius: 18px;
            border: none;
            background: #e2e8f0;
            font-weight: 800;
            font-size: 26px;
            cursor: pointer;
            transition: 0.15s;
            min-height: 100px;
        }

        .machine-btn:hover {
            background: #cbd5f5;
        }

        .machine-btn:active {
            transform: scale(0.95);
        }

        .lot-panel {
            width: 100%;
            max-width: 900px;

            margin-top: 20px;

            background: #fff;
            border-radius: 18px;

            padding: 20px;

            box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
        }

        .lot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 14px;
        }

        .lot-header h3 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }

        #refreshLotsBtn {
            border: none;
            background: #2563eb;
            color: white;

            padding: 10px 16px;

            border-radius: 10px;
            cursor: pointer;
        }

        #lotTable {
            width: 100%;
            border-collapse: collapse;
        }

        #lotTable th {
            background: #f1f5f9;
            padding: 14px;
            text-align: left;
        }

        #lotTable td {
            padding: 14px;
            border-top: 1px solid #e5e7eb;
        }

        #lotTable tr {
            cursor: pointer;
            transition: .15s;
        }

        #lotTable tr:hover {
            background: #eff6ff;
        }

        .status-badge {
            display: inline-block;

            padding: 6px 10px;

            border-radius: 999px;

            font-size: 13px;
            font-weight: 700;
        }

        .status-running {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-passed {
            background: #dcfce7;
            color: #15803d;
        }

        .status-pending {
            background: #e5e7eb;
            color: #374151;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Production Process</h1>
        <p>Enter manually (Go) or scan QR</p>

        <!-- Manual -->
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:12px;">
            <input id="manualInput" type="text" placeholder="Enter manually..."
                style="flex:1; padding:10px; font-size:16px;" />
            <button id="btnGo" style="padding:10px 16px; font-size:16px; cursor:pointer;">
                Go
            </button>
        </div>

        <div class="lot-panel">

            <div class="lot-header">
                <h3>Lots In Process</h3>

                <button id="refreshLotsBtn">
                    Refresh
                </button>
            </div>

            <table id="lotTable">
                <thead>
                    <tr>
                        <th>Lot</th>
                        <th>Part</th>
                        <th>Rev</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>

        </div>

        <!-- Scanner (CSS-hidden but focusable) -->
        <input id="scanInput" type="text" placeholder="Scan QR..." autocomplete="off" inputmode="none"
            style="position:absolute; left:-9999px; opacity:0;" />

        <div id="result" class="result"></div>
        <div class="hint">Ready</div>
    </div>

    <!-- PIN PAD MODAL -->
    <div id="pinOverlay" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:9999;
  align-items:center;
  justify-content:center;
">

        <div style="
    background:#fff;
    width:320px;
    border-radius:14px;
    padding:20px;
    text-align:center;
  ">

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="
  margin:0;
  font-size:38px;
  font-weight:800;
">
                    Enter PIN
                </h3>
                <button id="pinClose" style="font-size:20px;">✕</button>
            </div>

            <div id="pinDisplay" style="
      margin:16px 0;
      font-size:64px;
      letter-spacing:10px;
      font-weight:800;
    ">----</div>

            <div id="pinKeys" style="
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    ">
                <!-- numbers injected by JS -->
            </div>



        </div>
    </div>

    <!-- MACHINE SELECT -->
    <div id="machineOverlay"
        style=" display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999; align-items:center; justify-content:center; ">
        <div style="
    background:#fff;
    width:1000px;
    max-width:95vw;
    min-height:900px;
    border-radius:24px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
">
            <h3 style="
  margin:0;
  font-size:38px;
  font-weight:800;
">
                Select Machine
            </h3>
            <div id="machineList" style="
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
  margin-top:16px;
  max-height:700px;
  overflow-y:auto;
"></div>
            <button onclick="document.getElementById('machineOverlay').style.display='none'"> Cancel </button>
        </div>
    </div>
    <script type="module" src="/static/ui-traveler-landing.js"></script>

</body>

</html>
