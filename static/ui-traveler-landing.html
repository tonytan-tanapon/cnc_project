<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>QR Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        /* =========================
   RESET
========================= */

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        /* =========================
   BODY
========================= */

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
        }

        /* =========================
        CONTAINER
        ========================= */

        .container {
            min-height: 100vh;

            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;

            padding: 1px;

            width: 100%;
            max-width: 100vw;
        }

        /* =========================
        TYPOGRAPHY
        ========================= */

        h1 {
            margin-bottom: 10px;

            font-size: clamp(24px, 4vw, 42px);

            font-weight: 800;

            text-align: center;
        }

        p {
            margin-bottom: 24px;

            color: #64748b;

            font-size: clamp(14px, 2vw, 18px);

            text-align: center;
        }

        /* =========================
        INPUTS
        ========================= */

        input {
            width: 100%;
            max-width: 420px;

            font-size: clamp(18px, 2vw, 26px);

            padding: 16px 18px;

            border-radius: 12px;

            border: 2px solid #cbd5f5;

            outline: none;

            text-align: center;
        }

        input:focus {
            border-color: #2563eb;

            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* =========================
   RESULT
========================= */

        .result {
            margin-top: 20px;

            font-size: clamp(18px, 2vw, 22px);

            font-weight: 700;

            color: #16a34a;

            word-break: break-word;

            text-align: center;
        }

        .hint {
            margin-top: 12px;

            font-size: 14px;

            color: #94a3b8;
        }

        /* =========================
   PIN DISPLAY
========================= */

        .pin-dot {
            color: #cbd5f5;
        }

        .pin-dot.filled {
            color: #2563eb;
        }

        /* =========================
   PIN KEYS
========================= */

        #pinKeys {
            display: grid;

            grid-template-columns: repeat(3, 1fr);

            gap: 16px;

            margin-top: 24px;

            width: 100%;
        }

        .pin-btn {
            font-size: clamp(22px, 3vw, 34px);

            padding: 20px 0;

            border-radius: 18px;

            border: none;

            background: #e2e8f0;

            cursor: pointer;

            font-weight: 800;

            min-height: 80px;

            transition: 0.15s;
        }

        .pin-btn:hover {
            background: #dbe4f0;
        }

        .pin-btn:active {
            transform: scale(0.95);

            background: #cbd5f5;
        }

        /* DEL */
        .pin-btn:nth-last-child(3) {
            background: #fecaca;
        }

        /* CLEAR */
        .pin-btn:nth-last-child(1) {
            background: #fde68a;
        }

        /* =========================
   MACHINE BUTTON
========================= */

        .machine-btn {
            padding: 20px 12px;

            border-radius: 18px;

            border: none;

            background: #e2e8f0;

            font-weight: 800;

            font-size: clamp(16px, 2vw, 26px);

            cursor: pointer;

            transition: 0.15s;

            min-height: 90px;

            width: 100%;
        }

        .machine-btn:hover {
            background: #cbd5f5;
        }

        .machine-btn:active {
            transform: scale(0.95);
        }

        /* =========================
   LOT PANEL
========================= */

        .lot-panel {
            width: 100%;

            max-width: 1100px;

            margin-top: 20px;

            background: #fff;

            border-radius: 18px;

            padding: 20px;

            box-shadow: 0 4px 16px rgba(0, 0, 0, .08);

            overflow-x: auto;
        }

        /* =========================
   LOT HEADER
========================= */

        .lot-header {
            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 12px;

            margin-bottom: 14px;

            flex-wrap: wrap;
        }

        .lot-header h3 {
            margin: 0;

            font-size: clamp(20px, 2vw, 28px);

            font-weight: 800;
        }

        #refreshLotsBtn {
            border: none;

            background: #2563eb;

            color: white;

            padding: 10px 16px;

            border-radius: 10px;

            cursor: pointer;

            font-weight: 700;
        }

        #refreshLotsBtn:hover {
            background: #1d4ed8;
        }

        /* =========================
   TABLE
========================= */

        #lotTable {
            width: 100%;

            min-width: 700px;

            border-collapse: collapse;
        }

        #lotTable th {
            background: #f1f5f9;

            padding: 14px;

            text-align: left;

            font-size: 14px;
        }

        #lotTable td {
            padding: 14px;

            border-top: 1px solid #e5e7eb;

            font-size: 14px;
        }

        #lotTable tr {
            cursor: pointer;

            transition: .15s;
        }

        #lotTable tr:hover {
            background: #eff6ff;
        }

        /* =========================
   STATUS BADGES
========================= */

        .status-badge {
            display: inline-block;

            padding: 6px 10px;

            border-radius: 999px;

            font-size: 13px;

            font-weight: 700;
        }

        .status-running {
            background: #dbeafe;

            color: #1d4ed8;
        }

        .status-passed {
            background: #dcfce7;

            color: #15803d;
        }

        .status-pending {
            background: #e5e7eb;

            color: #374151;
        }

        /* =========================
   PIN OVERLAY
========================= */

        #pinOverlay {
            display: none;

            position: fixed;

            inset: 0;

            background: rgba(0, 0, 0, 0.55);

            z-index: 9999;

            align-items: center;

            justify-content: center;

            padding: 16px;
        }

        #pinOverlay>div {
            background: #fff;

            width: min(92vw, 520px);

            max-height: 92vh;

            overflow-y: auto;

            border-radius: 20px;

            padding: 24px;

            text-align: center;
        }

        #pinDisplay {
            margin: 16px 0;

            font-size: clamp(40px, 6vw, 72px);

            letter-spacing: 10px;

            font-weight: 800;
        }

        #pinClose {
            font-size: 22px;

            border: none;

            background: transparent;

            cursor: pointer;
        }

        /* =========================
   MACHINE OVERLAY
========================= */

        #machineOverlay {
            display: none;

            position: fixed;

            inset: 0;

            background: rgba(0, 0, 0, 0.55);

            z-index: 9999;

            align-items: center;

            justify-content: center;

            padding: 16px;
        }

        #machineOverlay>div {
            background: #fff;

            width: min(96vw, 1200px);

            height: min(92vh, 900px);

            border-radius: 24px;

            padding: 24px;

            text-align: center;

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);

            display: flex;

            flex-direction: column;
        }

        #machineOverlay h3 {
            margin: 0;

            font-size: clamp(26px, 4vw, 40px);

            font-weight: 800;
        }

        #machineList {
            flex: 1;

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));

            gap: 14px;

            margin-top: 20px;

            overflow-y: auto;

            padding-right: 4px;
        }

        /* =========================
   SCROLLBAR
========================= */

        #machineList::-webkit-scrollbar,
        #pinOverlay>div::-webkit-scrollbar,
        .lot-panel::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        #machineList::-webkit-scrollbar-thumb,
        #pinOverlay>div::-webkit-scrollbar-thumb,
        .lot-panel::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        /* =========================
   TABLET
========================= */

        @media (max-width: 1024px) {

            .container {
                padding: 16px;
            }

            .lot-panel {
                padding: 16px;
            }

            #machineList {
                grid-template-columns: repeat(2, 1fr);
            }

            .machine-btn {
                min-height: 80px;
            }

            #lotTable th,
            #lotTable td {
                padding: 12px;
            }
        }

        /* =========================
   MOBILE
========================= */

        @media (max-width: 640px) {

            .container {
                padding: 10px;
            }

            .lot-panel {
                padding: 12px;
            }

            .lot-header {
                flex-direction: column;

                align-items: stretch;
            }

            #machineList {
                grid-template-columns: 1fr;
            }

            .machine-btn {
                min-height: 70px;
            }

            #lotTable {
                min-width: 600px;
            }

            #lotTable th,
            #lotTable td {
                padding: 10px;

                font-size: 13px;
            }

            .pin-btn {
                min-height: 65px;
            }

            #pinKeys {
                gap: 12px;
            }
        }

        /* =========================
   LANDSCAPE TABLET FIX
========================= */

        @media (orientation: landscape) and (max-height: 700px) {

            .container {
                justify-content: flex-start;
            }

            #machineOverlay>div {
                height: 95vh;
            }

            #pinOverlay>div {
                max-height: 95vh;
            }

            .machine-btn {
                min-height: 65px;
            }
        }

        /* =========================================
   TABLET MACHINE FIX
========================================= */

        #machineList {
            width: 100%;
        }

        .machine-btn {

            width: 100%;

            min-height: 100px;

            font-size: 24px;

            border-radius: 18px;
        }

        /* TABLET */
        @media (max-width: 1024px) {

            #machineOverlay>div {

                width: min(94vw, 760px);

                height: min(88vh, 650px);

                padding: 20px;
            }

            #machineList {

                grid-template-columns:
                    repeat(3, 1fr);
            }

            .machine-btn {

                min-height: 85px;

                font-size: 20px;
            }
        }

        /* SMALL TABLET */
        @media (max-width: 768px) {

            #machineList {

                grid-template-columns:
                    repeat(2, 1fr);
            }

            .machine-btn {

                min-height: 75px;

                font-size: 18px;
            }
        }


        /* SORTABLE HEADER */
        #lotTable th {

            cursor: pointer;

            user-select: none;

            position: relative;
        }

        #lotTable th:hover {

            background: #dbeafe;
        }

        .sort-arrow {

            margin-left: 6px;

            font-size: 12px;

            color: #64748b;
        }
    </style>
</head>
