<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lot Shipment Status · Topnotch – MFG</title>

    <link rel="stylesheet" href="/static/css/app.css" />
    <link
      rel="stylesheet"
      href="/static/vendor/tabulator/tabulator_modern.min.css"
    />

    <style>
      #_reload {
  display: none;
} 
      .main--edge {
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      .panel--edge {
        margin: 0;
        border-radius: 0;
        border-left-width: 0;
        border-right-width: 0;
      }
      #listPanel {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      .list-topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 44px;
        border-bottom: 1px solid #e5e7eb;
        padding: 0;
      }
      .list-topbar .search-lg {
        flex: 0 0 200px;
        height: 36px;
        padding: 0 12px;
        border-radius: 0;
      }
      #listBody {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
      }
      #listBody .tabulator {
        height: 100% !important;
        border: 0;
      }

      .qty-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; /* ← tab-like columns */
  gap: 6px;
  text-align: right;
  font-variant-numeric: tabular-nums; /* numbers align nicely */
}
    </style>
  </head>

  <body>
  <div class="app">
    <aside class="sidebar">
      <div id="navSlot" data-nav-slot></div>
    </aside>

    <main class="main main--edge">
      <section class="panel panel--edge" id="listPanel">
        
        <div class="list-topbar">
          <input
            id="_q"
            type="search"
            class="search-lg"
            placeholder="Search…"
          />

          <span style="margin-left:10px;">LOT STATUS:</span>

          <!-- ✅ RADIO BUTTON -->
          <div id="_lot_status_group" style="display:inline-flex; gap:10px; margin-left:10px; flex-wrap:wrap;">
            
            <label class="radio-pill">
              <input type="radio" name="lot_status" value="" />
              <span>All</span>
            </label>

            <label class="radio-pill">
              <input type="radio" name="lot_status" value="not_start" checked />
              <span>No Ship</span>
            </label>

            <!-- <label class="radio-pill">
              <input type="radio" name="lot_status" value="in_process" />
              <span>In Process</span>
            </label> -->

            <label class="radio-pill">
              <input type="radio" name="lot_status" value="completed" />
              <span>Completed</span>
            </label>

          </div>

          <button id="_reload" class="btn" type="button">Reload</button>
          <button id="_export" class="btn" type="button">Export Excel</button>
        </div>

        <div id="listBody"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"><span id="toastText"></span></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="/static/vendor/tabulator/tabulator.min.js"></script>
  <script type="module" src="/static/js/nav-loader.js"></script>

  <!-- ✅ UPDATE JS -->
  <script type="module">
    import "/static/js/manage-lot-shipment-status.js";

    // ✅ radio filter handler
    document.querySelectorAll('input[name="lot_status"]').forEach(radio => {
      radio.addEventListener("change", () => {
        const status = document.querySelector('input[name="lot_status"]:checked')?.value || "";

        // 🔥 ถ้าคุณใช้ Tabulator global table
        if (window.table) {
          if (!status) {
            table.clearFilter();
          } else {
            table.setFilter("lot_status", "=", status);
          }
        }
      });
    });

    // ✅ reload button (optional)
    document.getElementById("_reload").addEventListener("click", () => {
      const status = document.querySelector('input[name="lot_status"]:checked')?.value || "";

      if (window.table) {
        if (!status) {
          table.clearFilter();
        } else {
          table.setFilter("lot_status", "=", status);
        }
      }
    });
  </script>

  <!-- ✅ STYLE (สำคัญ ทำให้สวยเหมือน button) -->
  <style>
    .radio-pill {
      background: #f3f4f6;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .radio-pill input {
      display: none;
    }

    .radio-pill span {
      pointer-events: none;
    }

    .radio-pill:hover {
      background: #e5e7eb;
    }

    .radio-pill input:checked + span {
      color: white;
    }

    .radio-pill input:checked ~ span,
    .radio-pill input:checked {
      background: transparent;
    }

    .radio-pill:has(input:checked) {
      background: #3b82f6;
      color: white;
      font-weight: 600;
    }
  </style>
</body>
</html>
