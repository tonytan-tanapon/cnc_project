<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1"
/>

<title>ECAR</title>

<link
  rel="stylesheet"
  href="/static/css/app.css"
/>

<link
  rel="stylesheet"
  href="/static/vendor/tabulator/tabulator_modern.min.css"
/>

<style>

.main--edge{
  padding:0;
  height:100vh;
  overflow:hidden;
}

.panel--edge{
  margin:0;
  border-radius:0;
  border-left-width:0;
  border-right-width:0;
}

#listPanel{
  display:flex;
  flex-direction:column;
  height:100%;
}

.list-topbar{
  display:flex;
  align-items:center;
  gap:8px;
  height:44px;
  border-bottom:1px solid #e5e7eb;
}

.search-lg{

  width:300px !important;

  flex:none !important;

}

#listBody{
  flex:1;
  overflow:auto;
}

</style>

</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div
      id="navSlot"
      data-nav-slot
    ></div>
  </aside>

  <main class="main main--edge">

    <section
      class="panel panel--edge"
      id="listPanel"
    >


      <div class="list-topbar">

        <input
          id="_q"
          type="search"
          class="search-lg"
          placeholder="Search ECAR..."
        />

        <button
          id="_add"
          class="btn"
        >
          + Add
        </button>

      </div>

      <div id="listBody"></div>

    </section>

  </main>

</div>

<script
  type="module"
  src="/static/js/nav-loader.js"
></script>

<script src="/static/vendor/tabulator/tabulator.min.js"></script>

<script  type="module"  src="/static/js/page-ecars.js?v=1.1"></script>

</body>
</html>
