<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customers · Topnotch – MFG</title>

  <!-- Global styles -->
  <link rel="stylesheet" href="/static/css/app.css" />
  <link rel="stylesheet" href="/static/css/crud-page.css">
  <!-- Tabulator theme -->
  <link rel="stylesheet" href="/static/vendor/tabulator/tabulator_modern.min.css" />
 
  
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div id="navSlot" data-nav-slot></div>
    </aside>

    <main class="main main--edge">

      <section class="panel panel--edge" id="listPanel">

        <div>Material Traceability</div>

        <div class="list-topbar">
          <input id="_q" type="search" class="search-lg" placeholder="Search Lot, Batch, Heat Lot..." />

          <button id="_add" class="btn" type="button">
            + Add
          </button>
        </div>

        <!-- ADD PANEL -->
        <div id="addPanel" style="
            display:none;
            padding:10px;
            border-bottom:1px solid #e5e7eb;
            background:#f8f9fa;
          ">

          <div style="
              display:flex;
              gap:10px;
              align-items:end;
              flex-wrap:wrap;
            ">

            <div>
              <label>Lot No</label>
              <input id="_lot_id" class="form-control" list="lotList">

              <datalist id="lotList"></datalist>
            </div>

            <div>
              <label>Batch</label>
              <input
    id="_batch_id"
    class="form-control"
    style="width:450px"
    list="batchList">

<datalist id="batchList"></datalist>
            </div>

            <div>
              <button id="_save" class="btn btn-primary">
                Save
              </button>
            </div>

            <div>
              <button id="_cancelAdd" class="btn btn-secondary">
                Cancel
              </button>
            </div>

          </div>

        </div>

        <!-- TABLE -->
        <div id="listBody"></div>

      </section>

    </main>

  </div>

  <!-- TOAST -->
  <div id="appToast" class="toast align-items-center position-fixed bottom-0 end-0 m-3" role="alert"
    aria-live="assertive" aria-atomic="true">

    <div class="toast-body"></div>

  </div>

  <script type="module" src="/static/js/nav-loader.js"></script>

  <script src="/static/vendor/tabulator/tabulator.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="/static/js/material_traceability.js?v=1.2"></script>

</body>

</html>
