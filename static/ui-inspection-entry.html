<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inspection Entry</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        .page {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------------- LEFT ---------------- */

        .left-panel {
            margin-right: 360px;
            padding: 20px;
            overflow-y: auto;
            height: 100vh;
        }

        .card {

            background: white;

            border-radius: 10px;

            padding: 20px;

            box-shadow: 0 2px 8px rgba(0, 0, 0, .15);

        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .info {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .info input {

            width: 100%;

            padding: 8px;

        }

        table {

            width: 100%;

            border-collapse: collapse;

        }

        th {

            background: #2563eb;

            color: white;

        }

        th,
        td {

            border: 1px solid #ddd;

            padding: 8px;

            text-align: center;

        }

        .actual {

            width: 100%;

            text-align: center;

            padding: 6px;

        }

        .remark {

            width: 100%;

            padding: 6px;

        }

        .footer {

            margin-top: 20px;

            display: flex;

            justify-content: flex-end;

            gap: 10px;

        }

        .footer button {

            padding: 10px 20px;

            border: none;

            border-radius: 8px;

            font-size: 16px;

            cursor: pointer;

        }

        .save {

            background: #16a34a;

            color: white;

        }

        .cancel {

            background: #dc2626;

            color: white;

        }

        /* ---------------- RIGHT ---------------- */

        .right-panel {
            position: fixed;
            top: 0;
            right: 0;

            width: 360px;
            height: 100vh;

            border-left: 1px solid #ddd;
            background: white;

            padding: 20px;

            overflow-y: auto;
        }

        .right-panel h2 {

            margin-top: 0;

            text-align: center;

        }

        .keyboard {

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 10px;

        }

        .keyboard button {

            height: 70px;

            font-size: 26px;

            font-weight: bold;

            border: none;

            border-radius: 10px;

            background: #f1f5f9;

            cursor: pointer;

        }

        .keyboard button:hover {

            background: #2563eb;

            color: white;

        }

        .keyboard.disabled {

            opacity: .35;

            pointer-events: none;

        }

        .backspace {

            background: #dc2626 !important;

            color: white;

        }

        .clear {

            grid-column: span 4;

            background: #f59e0b !important;

            color: white;

        }

        .pass {

            background: #16a34a !important;

            color: white;

        }

        .fail {

            background: #dc2626 !important;

            color: white;

        }

        .pass,
        .fail {
            grid-column: span 2;
        }

        .actual {
            cursor: pointer;
            caret-color: transparent;
        }

        .enter {

            grid-column: span 4;

            background: #2563eb !important;

            color: white;

        }

        .show-keyboard {

            grid-column: span 4;

            background: #2563eb !important;

            color: white;

        }

        tr.active-row {
            background: #dbeafe;
        }

        .actual,
        .tqw,
        .remark {
            width: 100%;
            height: 36px;
            padding: 6px 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 70px;
        }
    </style>

</head>

<body>

    <div class="page">

        <!---------------- LEFT ---------------->

        <div class="left-panel">

            <div class="card">

                <!-- <div class="header">

                    <h2>Inspection Entry</h2>

                    <div>

                        Inspection #

                        <span id="inspectionNo"></span>

                    </div>

                </div> -->

                <div class="info">

                    <div>Lot</div>
                    <div id="lotNo"></div>

                    <div>Part</div>
                    <div id="partNo"></div>

                    <div>Revision</div>
                    <div id="revision"></div>

                    <input id="inspector" readonly inputmode="none" hidden>


                    <!-- <div>Date</div>
                <input id="inspectionDate" type="date"> -->

                </div>

                <table>

                    <thead>

                        <tr>

                            <th>OP</th>

                            <th>Bubble</th>

                            <th>Dimension</th>

                            <th>TQW</th>

                            <th>FA</th>

                            <th>Remark</th>

                            <th>Date</th>

                        </tr>

                    </thead>

                    <tbody id="inspectionBody">

                    </tbody>

                </table>

                <!-- <div class="footer">

                    <button class="cancel">

                        Cancel

                    </button>

                    <button class="save">

                        Save

                    </button>

                </div> -->

            </div>

        </div>

        <!---------------- RIGHT ---------------->

        <div class="right-panel">

            <!-- <h2>Keyboard</h2> -->

            <div id="keyboard" class="keyboard disabled">

                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <button class="key backspace">⌫</button>

                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="±">±</button>

                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="Ø">Ø</button>

                <button class="key" data-key="0">0</button>
                <button class="key" data-key=".">.</button>
                <button class="key" data-key="-">-</button>
                <button class="key" data-key="°">°</button>

                <button class="key" data-key="/">/</button>
                <button class="key" data-key="~">~</button>
                <button class="key" data-key="'">'</button>
                <button class="key" data-key="√">√</button>

                

                <!-- <button class="key clear">
                    CLEAR
                </button> -->

                <button class="key enter">
                    ENTER
                </button>

                <button class="key show-keyboard">
                    Show Keyboard
                </button>

                <button class="key pass" data-key="Conforms">

                    Conforms

                </button>

                <button class="key fail" data-key="Visual">

                    Visual

                </button>

                

            </div>

        </div>

    </div>


    <script type="module" src="/static/js/page-inspection-entry.js?v=1.1"></script>

</body>

</html>
