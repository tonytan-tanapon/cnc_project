<!DOCTYPE html>
<html>
<head>
  <title>Traveler View</title>

  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      background: #f9fafb;
    }

    h2 { margin-bottom: 5px; }

    .meta {
      margin-bottom: 20px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #999;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #e5e7eb;
    }

    /* 🔥 reject highlight */
    tr.reject {
      background: #fee2e2;
    }

    /* 🔥 draft row (NEW) */
    tr.draft {
      background: #ecfeff;
    }

    /* 🔥 editable cell */
    td[contenteditable="true"] {
      background: #fff7ed;
      cursor: text;
    }

    td[contenteditable="true"]:focus {
      outline: 2px solid orange;
    }

    button {
      padding: 4px 6px;
      margin: 1px;
      cursor: pointer;
    }

    /* 🔥 nicer button */
    button:hover {
      opacity: 0.8;
    }


    th:nth-child(8),
td:nth-child(8) {
  width: 180px;          /* fixed width */
  max-width: 180px;
  white-space: nowrap;   /* no wrap */
  overflow: hidden;
  
}


  </style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div class="meta" id="meta"></div>


<div style="margin-bottom:10px; padding:10px; background:#fff; border:1px solid #ccc;">
  <b>Add Step Log</b>

  <select id="input_step">
    <option value="">Select OP</option>
  </select>

  <input type="date" id="input_date">

  <input type="number" id="input_accept" placeholder="Good" style="width:80px">
  <input type="number" id="input_reject" placeholder="Bad" style="width:80px">

  <select id="input_operator"></select>
  <select id="input_machine"></select>

  <input type="text" id="input_note" placeholder="Note" style="width:180px">

  <button onclick="submitTopInput()">➕ Add</button>
</div>

<table>
  <thead>
    <tr>
      <th>OP</th>
      <th>Status</th>
      <th>Date</th>
      
      <th>Good</th>
      <th>Bad</th>
      <th>Operator</th>
      <th>Machine</th>
      <th>Note</th>

       <!-- 🔥 ADD THESE -->
  <th>Supplier PO</th>
  <th>Supplier</th>
  <th>Heat Lot</th>
      <th>Receive</th>
      <th>Accept</th>
      <th>Reject</th>
      <th>Remain</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<!-- 🔥 IMPORTANT: version updated -->
<script src="/static/js/traveler-view.js?v=7.0"></script>

</body>
</html>
