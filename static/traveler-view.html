<!DOCTYPE html>
<html>
<head>
  <title>Traveler View</title>

<style>
/* =========================
   BASE
========================= */
body {
  font-family: system-ui;
  padding: 20px;
  background: #f9fafb;
}

h2 { margin-bottom: 5px; }

.meta {
  margin-bottom: 20px;
  color: #555;
}

/* =========================
   TABLE
========================= */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  font-size: 14px;
}

th, td {
  border: 1px solid #d1d5db;
  padding: 6px;
  text-align: center;
  vertical-align: top !important;
}

th {
  background: #f3f4f6;
  font-weight: 600;
}

/* =========================
   ROW STATE
========================= */
tr.reject {
  background: #fee2e2;
}

tr.draft {
  background: #ecfeff;
}

tr:hover {
  background: #f9fafb;
}

/* =========================
   EDITABLE CELL
========================= */
td[contenteditable="true"] {
  background: #fff7ed;
  cursor: text;
}

td[contenteditable="true"]:focus {
  outline: 2px solid orange;
}

/* =========================
   BUTTON
========================= */
button {
  padding: 4px 6px;
  margin: 1px;
  cursor: pointer;
  border-radius: 4px;
  border: 1px solid #ccc;
  background: #f9fafb;
}

button:hover {
  opacity: 0.8;
}

/* =========================
   FORM INPUT
========================= */
select, input {
  padding: 4px;
  border-radius: 4px;
  border: 1px solid #ccc;
  font-size: 13px;
}

/* =========================
   NOTE COLUMN
========================= */
th:nth-child(8),
td:nth-child(8) {
  width: 240px;
  max-width: 240px;
  text-align: left;

  white-space: pre-wrap;
  word-break: break-word;

  padding: 0 !important;   /* 🔥 เต็มกรอบ */
}

/* =========================
   TEXTAREA (FINAL FIX)
========================= */
td:nth-child(8) textarea {
  display: block;

  width: 100%;
  height: 100%;
  min-height: 60px;

  margin: 0;
  padding: 0 6px;              /* 🔥 เอา padding top ออก */

  box-sizing: border-box;

  border: none;
  border-radius: 0;

  font-family: inherit;
  font-size: 14px;

  line-height: 1;              /* 🔥 ลดช่องว่างบรรทัด */
        /* 🔥 สำคัญ */

  resize: vertical;
  overflow-y: auto;

  background: #ffffff;
}

td:nth-child(8) textarea::placeholder {
  line-height: 1;
}

td:nth-child(8) textarea {
  padding-top: 0 !important;
  line-height: 1 !important;
  display: block;
}

td:nth-child(8) textarea {
  vertical-align: top;
}

td:nth-child(8) textarea {
  display: flex;
  align-items: flex-start;   /* ⭐ ตัวนี้ทำให้ text ชิดบนจริง */
  padding: 0 6px;
}

td:nth-child(8) textarea {
  padding: 2px 6px 0 6px;   /* 👈 ใส่นิดเดียวด้านบน */
  line-height: 1.1;
}
/* =========================
   ADD PANEL
========================= */
div[style*="Add Step Log"] {
  border-radius: 6px;
}

/* =========================
   OPTIONAL: zebra
========================= */
tbody tr:nth-child(even) {
  background: #fafafa;
}
</style>

  
</head>

<body>

<h2 id="title">Loading...</h2>
<div class="meta" id="meta"></div>


<div style="margin-bottom:10px; padding:10px; background:#fff; border:1px solid #ccc;">
  <b>Add Step Log</b>

  <select id="input_step">
    <option value="">Select OP</option>
  </select>

  <input type="date" id="input_date">

  <input type="number" id="input_accept" placeholder="Good" style="width:80px">
  <input type="number" id="input_reject" placeholder="Bad" style="width:80px">

  <select id="input_operator"></select>
  <select id="input_machine"></select>

  <input type="text" id="input_note" placeholder="Note" style="width:180px">

  <button onclick="submitTopInput()">➕ Add</button>
</div>

<table>
  <thead>
    <tr>
      <th>OP</th>
      <th>Status</th>
      <th>Date</th>
      
      <th>Good</th>
      <th>Bad</th>
      <th>Operator</th>
      <th>Machine</th>
      <th>Note</th>

       <!-- 🔥 ADD THESE -->
  <th>Supplier PO</th>
  <th>Supplier</th>
  <th>Heat Lot</th>
      <th>Receive</th>
      <th>Accept</th>
      <th>Reject</th>
      <th>Remain</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<!-- 🔥 IMPORTANT: version updated -->
<script src="/static/js/traveler-view.js?v=7.0"></script>

</body>
</html>
