<!DOCTYPE html>
<html>
<head>
  <title>Traveler View</title>

  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      background: #f9fafb;
    }

    h2 { margin-bottom: 5px; }

    .meta {
      margin-bottom: 20px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #999;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #e5e7eb;
    }

    /* 🔥 reject highlight */
    tr.reject {
      background: #fee2e2;
    }

    /* 🔥 draft row (NEW) */
    tr.draft {
      background: #ecfeff;
    }

    /* 🔥 editable cell */
    td[contenteditable="true"] {
      background: #fff7ed;
      cursor: text;
    }

    td[contenteditable="true"]:focus {
      outline: 2px solid orange;
    }

    button {
      padding: 4px 6px;
      margin: 1px;
      cursor: pointer;
    }

    /* 🔥 nicer button */
    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h2 id="title">Loading...</h2>
<div class="meta" id="meta"></div>

<table>
  <thead>
    <tr>
      <th>OP</th>
      <th>Date</th>
      <th>Recv</th>
      <th>Accept</th>
      <th>Reject</th>
      <th>Operator</th>
      <th>Step Recv</th>
      <th>Step Accept</th>
      <th>Step Reject</th>
      <th>Remain</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<!-- 🔥 IMPORTANT: version updated -->
<script src="/static/js/traveler-view.js?v=6.0"></script>

</body>
</html>
