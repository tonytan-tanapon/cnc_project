<!DOCTYPE html>
<html>

<head>
  <title>Traveler View</title>

  <style>

/* =========================
BASE
========================= */

body {
  font-family: system-ui, sans-serif;
  padding: 20px;
  background: #f9fafb;
  margin: 0;
}

h2 {
  margin-bottom: 5px;
}

.meta {
  margin-bottom: 20px;
  color: #555;
  font-size: 14px;
}

/* =========================
TABLE
========================= */

.table-wrap {
  width: 100%;
  overflow-x: auto;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: white;
}

table {

  width: 100%;

  min-width: 2200px;

  border-collapse: collapse;

  background: white;

  font-size: 14px;

  table-layout: fixed;
}

thead th {

  position: sticky;

  top: 0;

  z-index: 5;

  background: #f3f4f6;

  font-weight: 600;

  white-space: nowrap;
}

th,
td {

  border: 1px solid #d1d5db;

  padding: 4px 6px;

  text-align: center;

  vertical-align: middle;
}

/* =========================
TOP ALIGN
========================= */

.col-op,
.col-name,
.col-status,
.col-note,
.col-receive,
.col-accept,
.col-reject,
.col-remain {

  vertical-align: top !important;
}

/* =========================
ROWS
========================= */

tr.reject {
  background: #fee2e2 !important;
}

tr.draft {
  background: #ecfeff !important;
}

tbody tr:hover {
  background: #f9fafb;
}

tbody tr:nth-child(even) {
  background: #fafafa;
}

/* =========================
EDITABLE
========================= */

td[contenteditable="true"] {

  background: #fff7ed;

  cursor: text;
}

td[contenteditable="true"]:focus {

  outline: 2px solid orange;

  background: white;
}

/* =========================
BUTTON
========================= */

button {

  padding: 4px 8px;

  margin: 1px;

  cursor: pointer;

  border-radius: 4px;

  border: 1px solid #ccc;

  background: #f9fafb;

  transition: 0.15s;
}

button:hover {
  opacity: 0.85;
}

/* =========================
FORM
========================= */

select,
input,
textarea {

  padding: 4px;

  border-radius: 4px;

  border: 1px solid #ccc;

  font-size: 13px;

  font-family: inherit;

  box-sizing: border-box;
}

/* =========================
COLUMN CLASSES
========================= */

.col-op {
  width: 50px;
  min-width: 50px;
  max-width: 50px;
}

.col-name {

  width: 230px;
  min-width: 230px;

  text-align: left;
}

.col-status {
  width: 90px;
  min-width: 90px;
}

.col-date {
  width: 140px;
  min-width: 140px;
}

.col-good,
.col-bad {

  width: 50px;
  min-width: 50px;
  max-width: 50px;

  padding: 2px !important;
}

.col-operator {

  width: 90px;
  min-width: 90px;
}

.col-machine {

  width: 85px;
  min-width: 85px;
}

/* =========================
NOTE
========================= */

.col-note {

  width: 260px;
  min-width: 260px;

  padding: 4px !important;

  text-align: left;
}

.col-note textarea {

  display: block;

  width: 100%;

  min-width: 240px;

  min-height: 28px;

  height: 28px;

  padding: 6px 8px;

  border: 1px solid #d1d5db;

  border-radius: 6px;

  font-size: 13px;

  font-family: inherit;

  line-height: 1.2;

  resize: none;

  overflow-y: hidden;

  box-sizing: border-box;

  background: white;
}

.col-note textarea:focus {

  outline: none;

  border-color: #3b82f6;

  box-shadow:
    0 0 0 2px rgba(59,130,246,.15);
}

/* =========================
SUPPLIER
========================= */

.col-supplier-po,
.col-supplier,
.col-heat-lot {

  width: 100px;
  min-width: 100px;
}

/* =========================
MATERIAL
========================= */

.col-mat-type,
.col-mat-size,
.col-mat-length,
.col-mat-qty,
.col-mat-uom {

  width: 95px;
  min-width: 95px;
}

/* =========================
DATES
========================= */

.col-send-date,
.col-recv-date {

  width: 130px;
  min-width: 130px;
}

/* =========================
SUMMARY
========================= */

.col-receive,
.col-accept,
.col-reject,
.col-remain {

  width: 90px;
  min-width: 90px;

  white-space: nowrap;

  font-weight: 600;
}

/* =========================
ACTION
========================= */

.col-action {

  width: 70px;
  min-width: 70px;
}

/* =========================
MOBILE
========================= */

@media (max-width: 900px) {

  body {
    padding: 10px;
  }

  table {
    font-size: 12px;
  }

  button,
  select,
  input,
  textarea {
    font-size: 12px;
  }
}

</style>

</head>

<body>

  <h2 id="title">Loading...</h2>
  <div class="meta" id="meta"></div>


  <div style="margin-bottom:10px; padding:10px; background:#fff; border:1px solid #ccc;">
    <b>Add Step Log</b>

    <select id="input_step">
      <option value="">Select OP</option>
    </select>

    <input type="date" id="input_date">

    <input type="number" id="input_accept" placeholder="Good" style="width:80px">
    <input type="number" id="input_reject" placeholder="Bad" style="width:80px">

    <select id="input_operator"></select>
    <select id="input_machine"></select>

    <input type="text" id="input_note" placeholder="Note" style="width:180px">
    <input type="text" id="input_supplier_po" placeholder="Supplier PO" style="width:80px">

    <input type="text" id="input_supplier_name" placeholder="Supplier" style="width:80px">

    <input type="text" id="input_supplier_lot" placeholder="Heat Lot" style="width:80px">
    <input type="text" id="input_material_type" placeholder="Mat Type" style="width:80px">

    <input type="text" id="input_material_size" placeholder="Mat Size" style="width:80px">

    <input type="text" id="input_material_length" placeholder="Length" style="width:80px">

    <input type="number" id="input_material_qty" placeholder="Qty" style="width:80px">

    <input type="text" id="input_material_uom" placeholder="UOM" style="width:70px">

    <input type="date" id="input_supplier_send_date">

    <input type="date" id="input_supplier_receive_date">
    <button onclick="submitTopInput()">➕ Add</button>
    <button onclick="saveAllRows()">
      💾 Save All
    </button>
  </div>

  <table>
    <thead>
      <tr id="thead-row"></tr>
    </thead>

    <tbody id="tbody"></tbody>
  </table>

  <!-- 🔥 IMPORTANT: version updated -->
  <script src="/static/js/traveler-view.js?v=9.0"></script>

</body>

</html>
