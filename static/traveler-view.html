<!DOCTYPE html>
<html>

<head>
  <title>Traveler View</title>

  <style>
    /* =========================
   BASE
========================= */

    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #f9fafb;
      margin: 0;
    }

    h2 {
      margin-bottom: 5px;
    }

    .meta {
      margin-bottom: 20px;
      color: #555;
      font-size: 14px;
    }

    /* =========================
   TABLE WRAPPER
========================= */

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
    }

    /* =========================
   TABLE
========================= */

    table {
  width: 100%;
  min-width: 1500px;
  border-collapse: collapse;
  background: white;
  font-size: 14px;

  table-layout: fixed;
}

    /* =========================
   HEADER
========================= */

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;

      background: #f3f4f6;

      font-weight: 600;

      white-space: nowrap;
    }

    /* =========================
   CELL
========================= */

    th,
    td {
      border: 1px solid #d1d5db;

      padding: 6px;

      text-align: center;

      vertical-align: top !important;
    }

    /* =========================
   ROW STATE
========================= */

    tr.reject {
      background: #fee2e2 !important;
    }

    tr.draft {
      background: #ecfeff !important;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    /* =========================
   ZEBRA
========================= */

    tbody tr:nth-child(even) {
      background: #fafafa;
    }

    /* =========================
   EDITABLE CELL
========================= */

    td[contenteditable="true"] {
      background: #fff7ed;
      cursor: text;
    }

    td[contenteditable="true"]:focus {
      outline: 2px solid orange;
      background: #ffffff;
    }

    /* =========================
   BUTTON
========================= */

    button {
      padding: 4px 8px;

      margin: 1px;

      cursor: pointer;

      border-radius: 4px;

      border: 1px solid #ccc;

      background: #f9fafb;

      transition: 0.15s;
    }

    button:hover {
      opacity: 0.85;
    }

    /* =========================
   FORM INPUT
========================= */

    select,
    input,
    textarea {

      padding: 4px;

      border-radius: 4px;

      border: 1px solid #ccc;

      font-size: 13px;

      font-family: inherit;

      box-sizing: border-box;
    }

    /* =========================
   OP COLUMN
========================= */

th:nth-child(1),
td:nth-child(1) {
  width: 70px;
  min-width: 70px;
  max-width: 70px;
}

/* =========================
   NAME COLUMN
========================= */

th:nth-child(2),
td:nth-child(2) {
  width: 220px;
  min-width: 220px;
  text-align: left;
}

/* =========================
   STATUS COLUMN
========================= */

th:nth-child(3),
td:nth-child(3) {
  width: 110px;
  min-width: 110px;
}

/* =========================
   DATE COLUMN
========================= */

th:nth-child(4),
td:nth-child(4) {
  width: 130px;
  min-width: 130px;
}

/* =========================
   GOOD/BAD COLUMN
========================= */

/* =========================
   GOOD/BAD COLUMN
========================= */

th:nth-child(5),
td:nth-child(5),
th:nth-child(6),
td:nth-child(6) {

  width: 45px !important;
  min-width: 45px !important;
  max-width: 45px !important;

  padding: 2px !important;

  overflow: hidden;
}

/* =========================
   OPERATOR COLUMN
========================= */

th:nth-child(7),
td:nth-child(7) {
  width: 90px !important;
  min-width: 90px !important;
  max-width: 90px !important;
}

/* =========================
   MACHINE COLUMN
========================= */

th:nth-child(8),
td:nth-child(8) {
  width: 70px !important;
  min-width: 70px !important;
  max-width: 70px !important;
}

/* =========================
   NOTE COLUMN
========================= */

th:nth-child(9),
td:nth-child(9) {

  width: 260px;
  min-width: 260px;
  max-width: 260px;

  text-align: left;

  white-space: pre-wrap;
  word-break: break-word;

  padding: 0 !important;
}

/* =========================
   NOTE TEXTAREA
========================= */

td:nth-child(9) textarea {

  display: block;

  width: 100%;

  min-height: 60px;

  margin: 0;

  padding: 4px 6px;

  box-sizing: border-box;

  border: none;

  border-radius: 0;

  font-family: inherit;

  font-size: 14px;

  line-height: 1.2;

  resize: vertical;

  overflow-y: auto;

  background: white;
}

/* =========================
   SUPPLIER COLUMNS
========================= */

th:nth-child(10),
td:nth-child(10),

th:nth-child(11),
td:nth-child(11),

th:nth-child(12),
td:nth-child(12) {

  width: 80px !important;
  min-width: 80px !important;
  max-width: 80px !important;

  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* =========================
   RECEIVE / ACCEPT / REJECT
========================= */

th:nth-child(13),
td:nth-child(13),

th:nth-child(14),
td:nth-child(14),

th:nth-child(15),
td:nth-child(15),

th:nth-child(16),
td:nth-child(16) {

  width: 90px;
  min-width: 90px;
}

/* =========================
   ACTION COLUMN
========================= */

th:nth-child(17),
td:nth-child(17) {

  width: 80px;
  min-width: 80px;
}

    /* =========================
   ADD PANEL
========================= */

    .add-panel {

      margin-bottom: 14px;

      padding: 12px;

      background: white;

      border: 1px solid #d1d5db;

      border-radius: 8px;

      display: flex;

      flex-wrap: wrap;

      gap: 8px;

      align-items: center;
    }

    /* =========================
   MOBILE / TABLET
========================= */

    @media (max-width: 900px) {

      body {
        padding: 10px;
      }

      table {
        font-size: 12px;
      }

      button {
        font-size: 12px;
      }

      select,
      input,
      textarea {
        font-size: 12px;
      }
    }
  </style>


</head>

<body>

  <h2 id="title">Loading...</h2>
  <div class="meta" id="meta"></div>


  <div style="margin-bottom:10px; padding:10px; background:#fff; border:1px solid #ccc;">
    <b>Add Step Log</b>

    <select id="input_step">
      <option value="">Select OP</option>
    </select>

    <input type="date" id="input_date">

    <input type="number" id="input_accept" placeholder="Good" style="width:80px">
    <input type="number" id="input_reject" placeholder="Bad" style="width:80px">

    <select id="input_operator"></select>
    <select id="input_machine"></select>

    <input type="text" id="input_note" placeholder="Note" style="width:180px">
    <input
  type="text"
  id="input_supplier_po"
  placeholder="Supplier PO"
  style="width:140px"
>

<input
  type="text"
  id="input_supplier_name"
  placeholder="Supplier"
  style="width:140px"
>

<input
  type="text"
  id="input_supplier_lot"
  placeholder="Heat Lot"
  style="width:140px"
>

    <button onclick="submitTopInput()">➕ Add</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>OP</th>
        <th>Name</th>
        <th>Status</th>
        <th>Date</th>

        <th>Good</th>
        <th>Bad</th>
        <th>Operator</th>
        <th>Machine</th>
        <th>Note</th>

        <!-- 🔥 ADD THESE -->
        <th>Supplier PO</th>
        <th>Supplier</th>
        <th>Heat Lot</th>
        <th>Receive</th>
        <th>Accept</th>
        <th>Reject</th>
        <th>Remain</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="tbody"></tbody>
  </table>

  <!-- 🔥 IMPORTANT: version updated -->
  <script src="/static/js/traveler-view.js?v=7.0"></script>

</body>

</html>
