<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Close</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Traveler Close Process</h2>

    <button id="btnRun">
        Run Traveler Close
    </button>

    <div id="status"></div>

    <script>

        const statusDiv =
            document.getElementById("status");

        async function checkStatus() {

            try {

                const response = await fetch(
                    "/api/v1/service/traveler-close-status"
                );

                const data = await response.json();

                statusDiv.innerHTML =
                    "Status : " + data.status;

                if (data.status === "running") {

                    setTimeout(
                        checkStatus,
                        2000
                    );

                } else if (data.status === "completed") {

                    statusDiv.innerHTML =
                        "✅ Traveler Close Completed";

                } else if (data.status === "error") {

                    statusDiv.innerHTML =
                        "❌ Error : " + (data.message || "");

                }

            }
            catch (err) {

                console.error(err);

                statusDiv.innerHTML =
                    "❌ Cannot read status";

            }

        }

        document
            .getElementById("btnRun")
            .addEventListener("click", async () => {

                if (!confirm("Run Traveler Close Process?")) {
                    return;
                }

                try {

                    statusDiv.innerHTML =
                        "Starting...";

                    const response = await fetch(
                        "/api/v1/service/run-traveler-close",
                        {
                            method: "POST"
                        }
                    );

                    const data =
                        await response.json();

                    console.log(data);

                    if (data.status === "already_running") {

                        statusDiv.innerHTML =
                            "⚠ Process already running";

                        return;
                    }

                    statusDiv.innerHTML =
                        "Running...";

                    checkStatus();

                }
                catch (err) {

                    console.error(err);

                    statusDiv.innerHTML =
                        "❌ Error Running Process";

                }

            });

    </script>

</body>

</html>
