<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reset Password</title>

  <style>

    body {

      font-family: system-ui, sans-serif;

      background: #f9fafb;

      display: flex;
      align-items: center;
      justify-content: center;

      height: 100vh;
      margin: 0;
    }

    .box {

      width: 340px;

      background: white;

      padding: 28px 32px;

      border-radius: 12px;

      box-shadow:
        0 2px 12px rgba(0,0,0,.1);
    }

    h2 {

      margin-top: 0;

      text-align: center;
    }

    label {

      display: block;

      margin-top: 14px;

      font-weight: 600;
    }

    input {

      width: 100%;

      margin-top: 6px;

      padding: 10px 12px;

      border:
        1px solid #d1d5db;

      border-radius: 6px;

      font-size: 15px;
    }

    button {

      width: 100%;

      margin-top: 20px;

      padding: 11px;

      border: none;

      border-radius: 6px;

      background: #2563eb;

      color: white;

      font-size: 15px;
      font-weight: 600;

      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    .msg {

      margin-top: 14px;

      padding: 10px;

      border-radius: 6px;

      display: none;

      font-size: 14px;
    }

    .success {

      background: #ecfdf5;

      color: #065f46;

      border: 1px solid #10b981;
    }

    .error {

      background: #fef2f2;

      color: #991b1b;

      border: 1px solid #ef4444;
    }

  </style>
</head>

<body>

  <div class="box">

    <h2>🔑 Reset Password</h2>

    <label>Username</label>

    <input
      id="username"
      type="text"
      placeholder="Enter username"
    />

    <label>New Password</label>

    <input
      id="password"
      type="password"
      placeholder="Enter new password"
    />

    <label>Confirm Password</label>

    <input
      id="confirm"
      type="password"
      placeholder="Confirm password"
    />

    <button id="btnSave">
      Reset Password
    </button>

    <div id="msg" class="msg"></div>

  </div>

  <script>

    const usernameEl =
      document.getElementById("username");

    const passwordEl =
      document.getElementById("password");

    const confirmEl =
      document.getElementById("confirm");

    const btn =
      document.getElementById("btnSave");

    const msg =
      document.getElementById("msg");

    btn.addEventListener(
      "click",
      resetPassword
    );

    async function resetPassword() {

      const username =
        usernameEl.value.trim();

      const password =
        passwordEl.value.trim();

      const confirm =
        confirmEl.value.trim();

      // =========================
      // VALIDATE
      // =========================

      if (
        !username ||
        !password ||
        !confirm
      ) {

        showMessage(
          "Please fill all fields",
          false
        );

        return;
      }

      if (password !== confirm) {

        showMessage(
          "Passwords do not match",
          false
        );

        return;
      }

      try {

        // =========================
        // API CALL
        // =========================

        const resp = await fetch(
          "/api/v1/auth/reset-password",
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              username: username,
              password: password
            })
          }
        );

        if (!resp.ok) {

          const err =
            await resp.json()
            .catch(() => ({}));

          throw new Error(
            err.detail ||
            "Reset failed"
          );
        }

        showMessage(
          "Password updated successfully",
          true
        );

        setTimeout(() => {

          location.href =
            "/static/login.html";

        }, 1200);

      }
      catch(err) {

        showMessage(
          err.message ||
          "Request failed",
          false
        );
      }
    }

    function showMessage(
      text,
      success = true
    ) {

      msg.style.display =
        "block";

      msg.className =
        "msg " +
        (
          success
            ? "success"
            : "error"
        );

      msg.textContent =
        text;
    }

    [
      usernameEl,
      passwordEl,
      confirmEl
    ].forEach(el => {

      el.addEventListener(
        "keydown",
        (e) => {

          if (e.key === "Enter") {
            resetPassword();
          }
        }
      );
    });

  </script>

</body>
</html>
